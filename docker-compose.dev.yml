version: "3.9"

services:
  # LLM Serving service
  llm-serving:
    build: .
    ports:
      - "8006:8000"
    environment:
      - AUMOS_SERVICE_NAME=aumos-llm-serving
      - AUMOS_ENVIRONMENT=development
      - AUMOS_DEBUG=true
      - AUMOS_DATABASE__URL=postgresql+asyncpg://aumos:aumos_dev@postgres:5432/aumos
      - AUMOS_KAFKA__BROKERS=kafka:9092
      - AUMOS_REDIS__URL=redis://redis:6379/0
      - AUMOS_LLM__VLLM_BASE_URL=http://vllm:8080
      - AUMOS_LLM__OLLAMA_BASE_URL=http://ollama:11434
      - AUMOS_LLM__DEFAULT_MODEL=ollama/llama3.2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - ./src:/app/src
    restart: unless-stopped

  # Ollama (dev LLM)
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # PostgreSQL
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: aumos
      POSTGRES_PASSWORD: aumos_dev
      POSTGRES_DB: aumos
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aumos"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (rate limiting)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: aumos-dev-cluster
    ports:
      - "9092:9092"
    healthcheck:
      test: kafka-topics --bootstrap-server localhost:9092 --list
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  ollama_data:
